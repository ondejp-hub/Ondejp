<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ondejp.com | O seu guia no Japão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header><a class="logo" id="btnLogo">onde<span>jp</span>.com</a></header>

    <div id="telaInicial" class="animacao-tela">
        <section class="hero">
            <h1>O que você procura hoje?</h1>
            <div class="search-container">
                <input type="text" placeholder="Ex: Banco, Mercado..." id="inputBusca">
                <button class="btn-busca" id="btnBusca">Ir</button>
            </div>
            <button class="btn-localizacao" id="btnLocalizacao">📍 Perto de mim</button>
        </section>

        <section class="carrossel-section">
                        <div class="carrossel-container">
                <div class="item-carrossel color-1" data-cat="Mercados" data-titulo="🛒 Mercados & Açougues">
                    <div class="circulo">🛒</div><span class="legenda">Mercados</span>
                </div>
                <div class="item-carrossel color-5" data-cat="Comer" data-titulo="🍽️ Restaurantes">
                    <div class="circulo">🍽️</div><span class="legenda">Comer</span>
                </div>
                <div class="item-carrossel color-2" data-cat="Saúde" data-titulo="🏥 Saúde & Bem-estar">
                    <div class="circulo">🏥</div><span class="legenda">Saúde</span>
                </div>
                <div class="item-carrossel color-3" data-cat="Beleza" data-titulo="💅 Estética & Beleza">
                    <div class="circulo">💅</div><span class="legenda">Beleza</span>
                </div>
                <div class="item-carrossel color-6" data-cat="Burocracia" data-titulo="📄 Documentos & Suporte">
                    <div class="circulo">📄</div><span class="legenda">Burocracia</span>
                </div>
                <div class="item-carrossel color-4" data-cat="Serviços" data-titulo="💼 Serviços Gerais">
                    <div class="circulo">💼</div><span class="legenda">Serviços</span>
                </div>
                <div class="item-carrossel color-7" data-cat="Ajuda" data-titulo="🚨 Utilidade Pública">
                    <div class="circulo">🚨</div><span class="legenda">Ajuda</span>
                </div>
            </div>

        </section>
    </div>

    <div id="telaResultados" class="oculto animacao-tela">
        <div class="cabecalho-resultados">
            <button class="btn-voltar" id="btnVoltar">⬅ Voltar</button>
            <h2 class="titulo-pagina" id="tituloSecao">Resultados</h2>
        </div>
        <section class="resultados" id="areaResultados"></section>
    </div>

    <script src="script.js"></script>
</body>
</html>
